name: Root Wush
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install Wush
        timeout-minutes: 2
        run: |
          echo "🔄 Installing Wush..."
          curl -fsSL https://github.com/coder/wush/raw/refs/heads/main/install.sh | sudo sh
          
          # Находим, куда установился wush
          echo "🔍 Looking for wush binary..."
          WUSH_PATH=$(find /tmp /usr/local/bin /home -name "wush" -type f 2>/dev/null | head -1)
          
          if [ -z "$WUSH_PATH" ]; then
            echo "❌ Wush binary not found!"
            exit 1
          fi
          
          echo "✅ Found wush at: $WUSH_PATH"
          sudo mv "$WUSH_PATH" /usr/local/bin/wush
          sudo chmod +x /usr/local/bin/wush
          echo "✅ Wush installed to /usr/local/bin/wush"

      - name: Start Wush server
        timeout-minutes: 1
        run: |
          echo "🚀 Starting Wush server..."
          sudo /usr/local/bin/wush serve &
          sleep 10
          
          echo ""
          echo "=========================================="
          echo "✅ ROOT WUSH READY"
          echo "=========================================="
          echo "👉 КЛЮЧ ПОДКЛЮЧЕНИЯ:"
          sudo /usr/local/bin/wush connect --show-key
          echo "=========================================="
          echo "⚠️  Workflow активен 10 минут."
          echo "Подключение в Termux: wush ssh"
          echo "=========================================="

      - name: Keep alive
        run: sleep 540
