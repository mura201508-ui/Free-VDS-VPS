name: Root Wush
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Wush
        run: |
          curl -fsSL https://github.com/coder/wush/raw/refs/heads/main/install.sh | sudo sh
          # Находим где установился wush
          sudo find / -name "wush" -type f 2>/dev/null
          # Обычно он устанавливается в /usr/local/bin
          sudo ls -la /usr/local/bin/wush || echo "wush not in /usr/local/bin"
          
      - name: Start Wush
        run: |
          # Проверяем разные возможные пути
          if [ -f /usr/local/bin/wush ]; then
            sudo /usr/local/bin/wush serve &
          elif [ -f ./wush ]; then
            sudo ./wush serve &
          else
            # Пробуем запустить через командлет
            wush serve &
          fi
          sleep 5
          echo ""
          echo "=========================================="
          echo "✅ ROOT WUSH READY"
          echo "=========================================="
          
      - name: Show Key
        run: |
          if [ -f /usr/local/bin/wush ]; then
            sudo /usr/local/bin/wush connect --show-key
          elif [ -f ./wush ]; then
            sudo ./wush connect --show-key
          else
            wush connect --show-key
          fi
          echo "=========================================="

      - name: Keep alive
        run: sleep 360000
