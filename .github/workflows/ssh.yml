name: SSH via Cloudflare
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

      - name: Setup SSH
        run: |
          sudo apt update
          sudo apt install -y openssh-server
          sudo sed -i 's/#Port 22/Port 22/' /etc/ssh/sshd_config
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          PASSWORD=$(openssl rand -base64 12 | tr -d '=+/' | cut -c1-12)
          echo "root:$PASSWORD" | sudo chpasswd
          sudo systemctl restart ssh

      - name: Create Cloudflare Tunnel
        run: |
          nohup cloudflared tunnel --url ssh://localhost:22 &
          sleep 10
          curl -s http://localhost:4040/api/tunnels | grep -o 'https://[a-z0-9.-]*\.trycloudflare.com'

      - name: Show
        run: |
          echo ""
          echo "=========================================="
          echo "1. Найди выше ссылку вида: https://xxxx.trycloudflare.com"
          echo "2. Подключайся: ssh root@xxxx.trycloudflare.com -p 22"
          echo "3. Пароль: $PASSWORD"
          echo "=========================================="

      - name: Keep
        run: sleep 360000
