name: VLESS SSH
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          sudo apt update
          sudo apt install -y openssh-server
          sudo sed -i 's/#Port 22/Port 22/' /etc/ssh/sshd_config
          sudo sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          PASSWORD=$(openssl rand -base64 12 | tr -d '=+/' | cut -c1-12)
          echo "root:$PASSWORD" | sudo chpasswd
          sudo systemctl restart ssh
          echo "SSH_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      - name: Setup 3X-UI
        run: |
          sudo bash -c "$(curl -Ls https://raw.githubusercontent.com/mhsanaei/3x-ui/master/install.sh)"
          sleep 10
          sudo x-ui setting -port 8080 -webBasePath panel -listenIP 0.0.0.0
          sudo x-ui setting -username admin -password admin

      - name: Setup VLESS
        run: |
          IP=$(curl -s ifconfig.me)
          PRIVATE_KEY=$(sudo x-ui generate reality-key | grep "Private key:" | awk '{print $3}')
          PUBLIC_KEY=$(sudo x-ui generate reality-key | grep "Public key:" | awk '{print $3}')
          SHORT_ID=$(openssl rand -hex 8)
          UUID=$(cat /proc/sys/kernel/random/uuid)
          echo "IP=$IP" >> $GITHUB_ENV
          echo "PUBLIC_KEY=$PUBLIC_KEY" >> $GITHUB_ENV
          echo "SHORT_ID=$SHORT_ID" >> $GITHUB_ENV
          echo "UUID=$UUID" >> $GITHUB_ENV

      - name: Add Inbound
        run: |
          sudo x-ui add-inbound --json "{\"remarks\":\"VLESS\",\"port\":443,\"protocol\":\"vless\",\"settings\":{\"clients\":[{\"id\":\"$UUID\",\"flow\":\"xtls-rprx-vision\"}],\"decryption\":\"none\"},\"streamSettings\":{\"network\":\"tcp\",\"security\":\"reality\",\"realitySettings\":{\"dest\":\"www.microsoft.com:443\",\"serverNames\":[\"www.microsoft.com\"],\"privateKey\":\"$PRIVATE_KEY\",\"shortIds\":[\"$SHORT_ID\"]}}}"

      - name: Show Results
        run: |
          VLESS_LINK="vless://$UUID@$IP:443?encryption=none&flow=xtls-rprx-vision&security=reality&sni=www.microsoft.com&fp=chrome&pbk=$PUBLIC_KEY&sid=$SHORT_ID&type=tcp&headerType=none#VLESS"
          echo ""
          echo "=========================================="
          echo "SERVER READY"
          echo "=========================================="
          echo "IP: $IP"
          echo "SSH: ssh root@$IP -p 22"
          echo "SSH Password: $SSH_PASSWORD"
          echo "Panel: http://$IP:8080/panel"
          echo "Panel Login: admin"
          echo "Panel Password: admin"
          echo ""
          echo "VLESS KEY:"
          echo "$VLESS_LINK"
          echo "=========================================="

      - name: Keep Alive
        run: sleep 360000
