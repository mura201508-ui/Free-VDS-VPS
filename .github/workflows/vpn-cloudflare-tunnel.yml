name: VPN via Cloudflare Tunnel

on:
  workflow_dispatch:

jobs:
  vpn:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Install Xray
        run: |
          bash -c "$(curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh)" @ install -u root

      - name: Configure and run VPN
        run: |
          # Генерация ключей
          UUID=$(cat /proc/sys/kernel/random/uuid)
          SID=$(openssl rand -hex 8)
          KEY_PAIR=$(/usr/local/bin/xray x25519)
          PRIVATE_KEY=$(echo "$KEY_PAIR" | grep "Private key" | awk '{print $3}')
          PUBLIC_KEY=$(echo "$KEY_PAIR" | grep "Public key" | awk '{print $3}')

          # Конфиг Xray на порту 8080 (внутренний)
          cat > /usr/local/etc/xray/config.json << EOF
          {
            "inbounds": [{
              "port": 8080,
              "protocol": "vless",
              "settings": {
                "clients": [{"id": "$UUID", "flow": "xtls-rprx-vision"}],
                "decryption": "none"
              },
              "streamSettings": {
                "network": "ws",
                "wsSettings": {"path": "/"},
                "security": "none"
              }
            }],
            "outbounds": [{"protocol": "freedom"}]
          }
          EOF

          # Запуск Xray
          systemctl restart xray

          # Запуск Cloudflare Tunnel (проброс порта 8080 наружу)
          echo "🔄 Запуск Cloudflare Tunnel..."
          cloudflared tunnel --url http://localhost:8080 > /tmp/tunnel.log 2>&1 &

          sleep 8

          # Извлечение URL туннеля из логов
          TUNNEL_URL=$(grep -o 'https://[a-zA-Z0-9.-]*\.trycloudflare\.com' /tmp/tunnel.log | head -1)

          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Ошибка: туннель не запустился"
            cat /tmp/tunnel.log
            exit 1
          fi

          TUNNEL_HOST=$(echo "$TUNNEL_URL" | sed 's|https://||')

          echo ""
          echo "══════════════════════════════════════════════════════════"
          echo "✅ VPN СЕРВЕР ЗАПУЩЕН через Cloudflare Tunnel"
          echo "══════════════════════════════════════════════════════════"
          echo ""
          echo "🌐 Адрес для подключения: $TUNNEL_HOST"
          echo "🔌 Порт: 443 (используйте TLS в клиенте)"
          echo ""
          echo "🔑 UUID: $UUID"
          echo "🔑 Public Key (pbk): $PUBLIC_KEY"
          echo ""
          echo "🔗 VLESS ССЫЛКА (скопировать целиком):"
          echo "vless://$UUID@$TUNNEL_HOST:443?encryption=none&security=tls&sni=$TUNNEL_HOST&fp=chrome&type=ws&path=%2F#Cloudflare_VPN"
          echo ""
          echo "📝 Альтернативно - параметры для ручного ввода:"
          echo "   Server: $TUNNEL_HOST"
          echo "   Port: 443"
          echo "   UUID: $UUID"
          echo "   Public Key: $PUBLIC_KEY"
          echo "   Security: tls"
          echo "   Network: ws"
          echo "   Path: /"
          echo "   SNI: $TUNNEL_HOST"
          echo ""
          echo "══════════════════════════════════════════════════════════"
          echo "🕐 Сервер живёт 6 часов (максимум GitHub Actions)"
          echo "══════════════════════════════════════════════════════════"

      - name: Keep alive
        run: |
          echo "✅ Туннель активен. Нажмите Ctrl+C для остановки."
          echo "Для подключения используйте VLESS ссылку выше."
          echo ""
          echo "=== Ожидание 6 часов ==="
          sleep 21600
