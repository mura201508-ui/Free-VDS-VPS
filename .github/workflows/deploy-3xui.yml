name: Быстрая установка 3x-ui (держит сервер 6ч)

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'IP сервера'
        required: true
        type: string
      ssh_username:
        description: 'SSH пользователь'
        required: true
        default: 'root'
        type: string
      ssh_key:
        description: 'Приватный SSH ключ'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Установка и ожидание 6 часов
        run: |
          ssh -o StrictHostKeyChecking=no -i <(echo "${{ github.event.inputs.ssh_key }}") \
            ${{ github.event.inputs.ssh_username }}@${{ github.event.inputs.server_ip }} << 'EOF'
            
            # Быстрая установка (3-5 минут)
            echo "=== Установка 3x-ui и Xray ==="
            curl -s -L https://raw.githubusercontent.com/mhsanaei/3x-ui/master/install.sh | bash -s -- --panel-port 2053 > /dev/null 2>&1
            bash -c "$(curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh)" @ install -u root > /dev/null 2>&1
            
            # Генерация ключей
            echo "=== Генерация ключей ==="
            KEY_OUTPUT=$(/usr/local/bin/xray x25519)
            PRIVATE_KEY=$(echo "$KEY_OUTPUT" | grep "Private key" | awk '{print $3}')
            PUBLIC_KEY=$(echo "$KEY_OUTPUT" | grep "Public key" | awk '{print $3}')
            UUID=$(cat /proc/sys/kernel/random/uuid)
            SHORT_ID=$(openssl rand -hex 8)
            SERVER_IP=$(curl -s ifconfig.me)
            
            # Готовый конфиг Xray
            cat > /usr/local/etc/xray/config.json << 'CONFIG'
            {
              "inbounds": [{
                "port": 443,
                "protocol": "vless",
                "settings": {
                  "clients": [{"id": "UUID_HERE", "flow": "xtls-rprx-vision"}],
                  "decryption": "none"
                },
                "streamSettings": {
                  "network": "tcp",
                  "security": "reality",
                  "realitySettings": {
                    "dest": "www.yahoo.com:443",
                    "serverNames": ["www.yahoo.com"],
                    "privateKey": "PRIVATE_HERE",
                    "shortIds": ["SHORT_HERE"],
                    "fingerprint": "chrome"
                  }
                }
              }],
              "outbounds": [{"protocol": "freedom"}]
            }
            CONFIG
            
            # Подстановка значений
            sed -i "s|UUID_HERE|$UUID|g" /usr/local/etc/xray/config.json
            sed -i "s|PRIVATE_HERE|$PRIVATE_KEY|g" /usr/local/etc/xray/config.json
            sed -i "s|SHORT_HERE|$SHORT_ID|g" /usr/local/etc/xray/config.json
            
            # Запуск
            systemctl restart xray
            systemctl enable xray
            
            # Открываем порт
            apt install -y ufw > /dev/null 2>&1
            ufw allow 443/tcp > /dev/null 2>&1
            ufw allow 22/tcp > /dev/null 2>&1
            echo "y" | ufw enable > /dev/null 2>&1
            
            # ВЫВОД КОНФИГА (можно скопировать)
            echo ""
            echo "══════════════════════════════════════════════════════════"
            echo "📋 СКОПИРУЙТЕ ЭТОТ БЛОК ЦЕЛИКОМ"
            echo "══════════════════════════════════════════════════════════"
            echo ""
            echo "🔑 PBK КЛЮЧ:"
            echo "$PUBLIC_KEY"
            echo ""
            echo "🔗 VLESS ССЫЛКА:"
            echo "vless://$UUID@$SERVER_IP:443?encryption=none&security=reality&sni=www.yahoo.com&fp=chrome&pbk=$PUBLIC_KEY&sid=$SHORT_ID&type=tcp&flow=xtls-rprx-vision#VLESS_$SERVER_IP"
            echo ""
            echo "📝 ПАРАМЕТРЫ:"
            echo "Server: $SERVER_IP"
            echo "Port: 443"
            echo "UUID: $UUID"
            echo "PublicKey (pbk): $PUBLIC_KEY"
            echo "Short ID: $SHORT_ID"
            echo ""
            echo "🎛️ ПАНЕЛЬ: http://$SERVER_IP:2053 | admin/admin"
            echo ""
            echo "══════════════════════════════════════════════════════════"
            echo "🕐 СЕРВЕР БУДЕТ РАБОТАТЬ 6 ЧАСОВ (21600 сек)"
            echo "══════════════════════════════════════════════════════════"
            
            # ============================================
            # ГЛАВНОЕ: ЖДЁМ 6 ЧАСОВ, ПОКА СЕРВЕР ЖИВЁТ
            # ============================================
            echo ""
            echo "✅ Установка завершена. Сервер активен, начинаем отсчёт 6 часов..."
            echo "Нажмите Ctrl+C для досрочного завершения (сервер остановится)"
            
            # Ждём 6 часов (21600 секунд)
            sleep 21600
            
            # После 6 часов — отключаем Xray (опционально)
            echo ""
            echo "⏰ 6 часов прошло. Останавливаем Xray..."
            systemctl stop xray
            
EOF
