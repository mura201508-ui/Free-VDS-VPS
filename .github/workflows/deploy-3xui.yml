name: Deploy 3x-ui VLESS Reality

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'IP сервера'
        required: true
        type: string
      ssh_username:
        description: 'SSH пользователь (обычно root)'
        required: true
        default: 'root'
        type: string
      ssh_key:
        description: 'Приватный SSH ключ (весь текст)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup and deploy
        run: |
          echo "${{ github.event.inputs.ssh_key }}" > key
          chmod 600 key
          ssh -o StrictHostKeyChecking=no -i key ${{ github.event.inputs.ssh_username }}@${{ github.event.inputs.server_ip }} "
            apt update && apt install -y curl wget openssl ufw
            curl -s -L https://raw.githubusercontent.com/mhsanaei/3x-ui/master/install.sh | bash
            bash -c \"\$(curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh)\" @ install -u root
            PUB_KEY=\$(/usr/local/bin/xray x25519 | grep 'Public key' | awk '{print \$3}')
            PRIV_KEY=\$(/usr/local/bin/xray x25519 | grep 'Private key' | awk '{print \$3}')
            UUID=\$(cat /proc/sys/kernel/random/uuid)
            SID=\$(openssl rand -hex 8)
            IP=\$(curl -s ifconfig.me)
            cat > /usr/local/etc/xray/config.json << JSON
            {
              \"inbounds\": [{
                \"port\": 443,
                \"protocol\": \"vless\",
                \"settings\": {
                  \"clients\": [{\"id\": \"\$UUID\", \"flow\": \"xtls-rprx-vision\"}],
                  \"decryption\": \"none\"
                },
                \"streamSettings\": {
                  \"network\": \"tcp\",
                  \"security\": \"reality\",
                  \"realitySettings\": {
                    \"dest\": \"www.yahoo.com:443\",
                    \"serverNames\": [\"www.yahoo.com\"],
                    \"privateKey\": \"\$PRIV_KEY\",
                    \"shortIds\": [\"\$SID\"],
                    \"fingerprint\": \"chrome\"
                  }
                }
              }],
              \"outbounds\": [{\"protocol\": \"freedom\"}]
            }
            JSON
            systemctl restart xray
            ufw allow 443/tcp
            echo 'y' | ufw enable
            echo '=========================================='
            echo 'PBK КЛЮЧ (Public Key):'
            echo \$PUB_KEY
            echo ''
            echo 'VLESS ССЫЛКА (скопировать целиком):'
            echo \"vless://\$UUID@\$IP:443?encryption=none&security=reality&sni=www.yahoo.com&fp=chrome&pbk=\$PUB_KEY&sid=\$SID&type=tcp&flow=xtls-rprx-vision#VLESS_\$IP\"
            echo '=========================================='
            echo 'Панель 3x-ui: http://'$IP':2053 | admin/admin'
            echo 'Сервер живёт 6 часов...'
            sleep 21600
            systemctl stop xray
          "
