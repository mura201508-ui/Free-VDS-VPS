name: Deploy 3x-ui with VLESS Reality

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'IP сервера'
        required: true
        type: string
      ssh_username:
        description: 'SSH пользователь (root или другой)'
        required: true
        default: 'root'
        type: string
      ssh_key:
        description: 'Приватный SSH ключ (весь текст с BEGIN)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ github.event.inputs.ssh_key }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ github.event.inputs.server_ip }} ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC..." >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy 3x-ui with VLESS Reality
        run: |
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key \
            ${{ github.event.inputs.ssh_username }}@${{ github.event.inputs.server_ip }} << 'EOF'
            
            set -e
            echo "=== 1. Обновление системы ==="
            apt update && apt upgrade -y
            
            echo "=== 2. Установка 3x-ui ==="
            curl -s -L https://raw.githubusercontent.com/mhsanaei/3x-ui/master/install.sh | bash
            
            echo "=== 3. Установка Xray core ==="
            bash -c "$(curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh)" @ install -u root
            
            echo "=== 4. Генерация ключей X25519 ==="
            KEY_OUTPUT=$(/usr/local/bin/xray x25519)
            PRIVATE_KEY=$(echo "$KEY_OUTPUT" | grep "Private key" | awk '{print $3}')
            PUBLIC_KEY=$(echo "$KEY_OUTPUT" | grep "Public key" | awk '{print $3}')
            
            echo "=== 5. Генерация UUID и Short ID ==="
            UUID=$(cat /proc/sys/kernel/random/uuid)
            SHORT_ID=$(openssl rand -hex 8)
            SERVER_IP=$(curl -s ifconfig.me)
            
            echo "=== 6. Создание конфигурации Xray ==="
            cat > /usr/local/etc/xray/config.json << 'XEOF'
{
  "log": {
    "loglevel": "info"
  },
  "inbounds": [
    {
      "listen": "0.0.0.0",
      "port": 443,
      "protocol": "vless",
      "settings": {
        "clients": [
          {
            "id": "UUID_PLACEHOLDER",
            "flow": "xtls-rprx-vision"
          }
        ],
        "decryption": "none"
      },
      "streamSettings": {
        "network": "tcp",
        "security": "reality",
        "realitySettings": {
          "dest": "www.yahoo.com:443",
          "serverNames": [
            "www.yahoo.com",
            "yahoo.com"
          ],
          "privateKey": "PRIVATE_KEY_PLACEHOLDER",
          "shortIds": [
            "SHORT_ID_PLACEHOLDER"
          ],
          "fingerprint": "chrome",
          "publicKey": "PUBLIC_KEY_PLACEHOLDER"
        }
      },
      "sniffing": {
        "enabled": true,
        "destOverride": ["http", "tls", "quic"]
      }
    }
  ],
  "outbounds": [
    {
      "protocol": "freedom",
      "tag": "direct"
    }
  ]
}
XEOF

            # Подставляем реальные значения
            sed -i "s|UUID_PLACEHOLDER|$UUID|g" /usr/local/etc/xray/config.json
            sed -i "s|PRIVATE_KEY_PLACEHOLDER|$PRIVATE_KEY|g" /usr/local/etc/xray/config.json
            sed -i "s|SHORT_ID_PLACEHOLDER|$SHORT_ID|g" /usr/local/etc/xray/config.json
            sed -i "s|PUBLIC_KEY_PLACEHOLDER|$PUBLIC_KEY|g" /usr/local/etc/xray/config.json
            
            echo "=== 7. Запуск Xray ==="
            systemctl restart xray
            systemctl enable xray
            
            echo "=== 8. Настройка firewall ==="
            ufw allow 22/tcp 2>/dev/null || true
            ufw allow 443/tcp 2>/dev/null || true
            echo "y" | ufw enable 2>/dev/null || true
            
            echo ""
            echo "=========================================="
            echo "=====   ГОТОВАЯ КОНФИГУРАЦИЯ   ====="
            echo "=========================================="
            echo ""
            echo "📌 ПАРАМЕТРЫ ДЛЯ ПОДКЛЮЧЕНИЯ:"
            echo "----------------------------------------"
            echo "🔹 Адрес (Server): $SERVER_IP"
            echo "🔹 Порт (Port): 443"
            echo "🔹 UUID: $UUID"
            echo "🔹 Flow: xtls-rprx-vision"
            echo "🔹 SNI: www.yahoo.com"
            echo "🔹 Fingerprint: chrome"
            echo ""
            echo "🔑 ПУБЛИЧНЫЙ КЛЮЧ (pbk):"
            echo "----------------------------------------"
            echo "$PUBLIC_KEY"
            echo "----------------------------------------"
            echo ""
            echo "🔹 Short ID: $SHORT_ID"
            echo ""
            echo "📎 ГОТОВАЯ VLESS ССЫЛКА:"
            echo "----------------------------------------"
            VLESS_URL="vless://$UUID@$SERVER_IP:443?encryption=none&security=reality&sni=www.yahoo.com&fp=chrome&pbk=$PUBLIC_KEY&sid=$SHORT_ID&type=tcp&flow=xtls-rprx-vision#VLESS_Reality_$SERVER_IP"
            echo "$VLESS_URL"
            echo "----------------------------------------"
            echo ""
            echo "📊 ПАНЕЛЬ 3X-UI:"
            echo "----------------------------------------"
            echo "🔹 URL: http://$SERVER_IP:2053"
            echo "🔹 Login: admin"
            echo "🔹 Password: admin"
            echo "----------------------------------------"
            echo ""
            echo "📋 ЛОГИ ДЛЯ ПРОВЕРКИ:"
            echo "----------------------------------------"
            echo "🔹 Xray логи: journalctl -u xray -f"
            echo "🔹 Статус Xray: systemctl status xray"
            echo "🔹 Проверка порта: ss -tlnp | grep :443"
            echo "----------------------------------------"
            echo ""
            echo "✅ УСТАНОВКА ЗАВЕРШЕНА!"
            echo "Скопируйте pbk ключ или VLESS ссылку в ваш клиент"
            
EOF

      - name: Сохранение pbk ключа в артефакты
        uses: actions/upload-artifact@v4
        with:
          name: vless-config
          path: |
            /tmp/pbk_key.txt
          retention-days: 7
          sleep 21600
